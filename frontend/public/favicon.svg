<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shield Background -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Shape -->
  <path d="M50 5 L90 20 L90 50 C90 75 70 92 50 98 C30 92 10 75 10 50 L10 20 Z" 
        fill="url(#shieldGrad)" 
        stroke="#1e40af" 
        stroke-width="2"/>
  
  <!-- Bridge/Setu Symbol -->
  <path d="M25 55 Q35 40 50 45 Q65 40 75 55" 
        fill="none" 
        stroke="url(#bridgeGrad)" 
        stroke-width="4" 
        stroke-linecap="round"/>
  
  <!-- Bridge Supports -->
  <line x1="35" y1="48" x2="35" y2="65" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="46" x2="50" y2="65" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="48" x2="65" y2="65" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Safety Pulse Line -->
  <path d="M20 70 L30 70 L35 65 L40 75 L45 68 L50 72 L55 66 L60 70 L65 70 L80 70" 
        fill="none" 
        stroke="#10b981" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- S Letter Accent -->
  <text x="50" y="38" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">S</text>
</svg>
